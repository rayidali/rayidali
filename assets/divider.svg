<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 16" width="820" height="16">
  <!-- Left line fading in -->
  <line x1="60" y1="8" x2="320" y2="8" stroke="#2C1810" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  
  <!-- Sparkle dots with wave effect -->
  <circle cx="340" cy="8" r="2.5" fill="#FF8C5A">
    <animate attributeName="r" values="2;3.5;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="8" r="2" fill="#A8D5BA">
    <animate attributeName="r" values="1.5;3;1.5" dur="2s" repeatCount="indefinite" begin="0.15s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.15s"/>
  </circle>
  <circle cx="380" cy="8" r="3" fill="#FFD760">
    <animate attributeName="r" values="2.5;4;2.5" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="400" cy="8" r="2" fill="#FF6B6B">
    <animate attributeName="r" values="1.5;3;1.5" dur="2s" repeatCount="indefinite" begin="0.45s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.45s"/>
  </circle>
  <circle cx="420" cy="8" r="3" fill="#B8D4F0">
    <animate attributeName="r" values="2.5;4;2.5" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle cx="440" cy="8" r="2" fill="#FBBFCA">
    <animate attributeName="r" values="1.5;3;1.5" dur="2s" repeatCount="indefinite" begin="0.75s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.75s"/>
  </circle>
  <circle cx="460" cy="8" r="2.5" fill="#FF8C5A">
    <animate attributeName="r" values="2;3.5;2" dur="2s" repeatCount="indefinite" begin="0.9s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.9s"/>
  </circle>
  <circle cx="480" cy="8" r="2" fill="#A8D5BA">
    <animate attributeName="r" values="1.5;3;1.5" dur="2s" repeatCount="indefinite" begin="1.05s"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1.05s"/>
  </circle>

  <!-- Right line -->
  <line x1="500" y1="8" x2="760" y2="8" stroke="#2C1810" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
</svg>
