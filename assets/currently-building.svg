<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 170" width="820" height="170">
  <!-- Shadow -->
  <rect x="6" y="6" width="808" height="158" fill="#000" opacity="0.15"/>
  <!-- Card -->
  <rect x="0" y="0" width="808" height="158" fill="#FFF8E7" stroke="#000" stroke-width="3.5"/>
  
  <!-- Left accent stripe -->
  <rect x="0" y="0" width="10" height="158" fill="#FF6B6B" stroke="#000" stroke-width="2"/>

  <!-- Live indicator -->
  <circle cx="35" cy="28" r="5" fill="#FF6B6B">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="50" y="33" font-family="monospace" font-size="11" fill="#FF6B6B" font-weight="bold">CURRENTLY BUILDING</text>

  <!-- Project name -->
  <text x="25" y="65" font-family="monospace" font-size="24" font-weight="bold" fill="#2C1810">🎬 Cinechrony</text>
  
  <!-- Description -->
  <text x="25" y="90" font-family="monospace" font-size="12" fill="#5A3E28">A social movie watchlist app — because Letterboxd forgot collaborative lists exist.</text>
  <text x="25" y="108" font-family="monospace" font-size="12" fill="#5A3E28">Neo-brutalist UI, shared watchlists, TikTok/Reel linking, Letterboxd import.</text>

  <!-- Tech tags -->
  <rect x="25" y="125" width="78" height="22" fill="#A8D5BA" stroke="#000" stroke-width="2"/>
  <text x="64" y="140" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">Next.js 15</text>
  
  <rect x="111" y="125" width="70" height="22" fill="#FFD4A8" stroke="#000" stroke-width="2"/>
  <text x="146" y="140" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">Firebase</text>
  
  <rect x="189" y="125" width="84" height="22" fill="#FBBFCA" stroke="#000" stroke-width="2"/>
  <text x="231" y="140" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">TypeScript</text>

  <rect x="281" y="125" width="52" height="22" fill="#B8D4F0" stroke="#000" stroke-width="2"/>
  <text x="307" y="140" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">TMDB</text>

  <!-- CTA arrow -->
  <text x="770" y="85" font-family="monospace" font-size="28" fill="#2C1810">→</text>
  
  <!-- Right side - mini app preview frame -->
  <rect x="620" y="30" width="155" height="110" fill="#2C1810" stroke="#000" stroke-width="2.5" rx="4"/>
  <rect x="625" y="42" width="145" height="93" fill="#1a1a2e" rx="2"/>
  <!-- Mini mockup elements -->
  <rect x="632" y="50" width="60" height="8" rx="2" fill="#FF6B6B" opacity="0.8"/>
  <rect x="632" y="64" width="130" height="5" rx="1" fill="#FFF8E7" opacity="0.3"/>
  <rect x="632" y="74" width="110" height="5" rx="1" fill="#FFF8E7" opacity="0.2"/>
  <rect x="632" y="88" width="62" height="30" rx="2" fill="#A8D5BA" opacity="0.4"/>
  <rect x="700" y="88" width="62" height="30" rx="2" fill="#FFD760" opacity="0.4"/>
  <rect x="632" y="123" width="130" height="5" rx="1" fill="#FFF8E7" opacity="0.15"/>
  <!-- Dot indicators -->
  <circle cx="635" cy="36" r="2" fill="#FF6B6B"/>
  <circle cx="643" cy="36" r="2" fill="#FFD760"/>
  <circle cx="651" cy="36" r="2" fill="#A8D5BA"/>
</svg>
