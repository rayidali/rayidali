<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 395 190" width="395" height="190">
  <!-- Shadow -->
  <rect x="5" y="5" width="385" height="180" fill="#000" opacity="0.15"/>
  <!-- Card -->
  <rect x="0" y="0" width="385" height="180" fill="#FFF8E7" stroke="#000" stroke-width="3"/>
  <!-- Accent -->
  <rect x="0" y="0" width="385" height="6" fill="#87CEEB" stroke="#000" stroke-width="2"/>

  <!-- Mini preview -->
  <rect x="270" y="22" width="95" height="65" fill="#2C1810" stroke="#000" stroke-width="2" rx="3"/>
  <!-- PDF icon -->
  <rect x="282" y="32" width="22" height="28" fill="#FF6B6B" rx="2"/>
  <text x="293" y="51" font-family="monospace" font-size="7" fill="#FFF8E7" text-anchor="middle">PDF</text>
  <!-- Arrow -->
  <text x="313" y="50" font-family="monospace" font-size="12" fill="#A8D5BA">→</text>
  <!-- Video icon -->
  <rect x="330" y="32" width="22" height="28" fill="#A8D5BA" rx="2"/>
  <text x="341" y="50" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">▶</text>

  <!-- Title -->
  <text x="18" y="42" font-family="monospace" font-size="20" font-weight="bold" fill="#2C1810">📄 pdf2video</text>

  <!-- Description -->
  <text x="18" y="68" font-family="monospace" font-size="11" fill="#5A3E28">drop a research paper, get a</text>
  <text x="18" y="84" font-family="monospace" font-size="11" fill="#5A3E28">3blue1brown-style explainer.</text>
  <text x="18" y="100" font-family="monospace" font-size="11" fill="#8B7355">yes, it actually works.</text>

  <!-- Tech tags -->
  <rect x="18" y="118" width="60" height="22" fill="#A8D5BA" stroke="#000" stroke-width="2"/>
  <text x="48" y="133" font-family="monospace" font-size="9" fill="#2C1810" text-anchor="middle">Python</text>

  <rect x="86" y="118" width="58" height="22" fill="#FFD4A8" stroke="#000" stroke-width="2"/>
  <text x="115" y="133" font-family="monospace" font-size="9" fill="#2C1810" text-anchor="middle">Claude</text>

  <rect x="152" y="118" width="55" height="22" fill="#FBBFCA" stroke="#000" stroke-width="2"/>
  <text x="180" y="133" font-family="monospace" font-size="9" fill="#2C1810" text-anchor="middle">Manim</text>

  <rect x="215" y="118" width="80" height="22" fill="#B8D4F0" stroke="#000" stroke-width="2"/>
  <text x="255" y="133" font-family="monospace" font-size="9" fill="#2C1810" text-anchor="middle">ElevenLabs</text>

  <!-- Bottom bar -->
  <rect x="0" y="154" width="385" height="26" fill="#2C1810"/>
  <text x="18" y="171" font-family="monospace" font-size="10" fill="#A8D5BA">★ 1</text>
  <text x="340" y="171" font-family="monospace" font-size="10" fill="#FFD760">view repo →</text>
</svg>
