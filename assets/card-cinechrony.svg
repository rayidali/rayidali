<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <!-- Shadow -->
  <rect x="6" y="6" width="388" height="168" fill="#000">
    <animate attributeName="x" values="6;4;6" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="6;4;6" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Card -->
  <rect x="0" y="0" width="388" height="168" fill="#FFF8E7" stroke="#000" stroke-width="3.5"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="388" height="8" fill="#FF6B6B" stroke="#000" stroke-width="3.5"/>
  
  <!-- Emoji -->
  <text x="25" y="50" font-size="28">🎬</text>
  
  <!-- Title -->
  <text x="65" y="48" font-family="monospace" font-size="20" font-weight="bold" fill="#2C1810">cinechrony</text>
  
  <!-- Description -->
  <text x="25" y="78" font-family="monospace" font-size="11.5" fill="#5A3E28">letterboxd but collaborative — because your</text>
  <text x="25" y="95" font-family="monospace" font-size="11.5" fill="#5A3E28">friends have terrible taste and you need proof</text>
  
  <!-- Tech tags -->
  <rect x="25" y="115" width="72" height="24" fill="#A8D5BA" stroke="#000" stroke-width="2"/>
  <text x="61" y="131" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">Next.js 15</text>
  
  <rect x="105" y="115" width="68" height="24" fill="#FFD4A8" stroke="#000" stroke-width="2"/>
  <text x="139" y="131" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">Firebase</text>
  
  <rect x="181" y="115" width="84" height="24" fill="#FBBFCA" stroke="#000" stroke-width="2"/>
  <text x="223" y="131" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">TypeScript</text>

  <rect x="273" y="115" width="52" height="24" fill="#B8D4F0" stroke="#000" stroke-width="2"/>
  <text x="299" y="131" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">TMDB</text>

  <text x="355" y="155" font-family="monospace" font-size="16" fill="#2C1810">→</text>
</svg>
