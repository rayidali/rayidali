<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A6C"/>
      <stop offset="35%" style="stop-color:#FFD4A8"/>
      <stop offset="65%" style="stop-color:#FFECD2"/>
      <stop offset="100%" style="stop-color:#E8F5E2"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="900" height="320" fill="url(#sky)"/>

  <!-- Sun glow -->
  <circle cx="720" cy="75" r="55" fill="#FFE87C" opacity="0.5">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="52;62;52" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="75" r="35" fill="#FFD760" stroke="#000" stroke-width="2.5"/>

  <!-- Far mountains -->
  <path d="M-20 220 L80 140 L140 165 L220 110 L300 155 L380 125 L460 160 L520 100 L600 145 L680 120 L760 150 L840 130 L920 160 L920 320 L-20 320 Z" 
        fill="#B8D4A3" stroke="#000" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Mid mountains -->
  <path d="M-20 260 L60 190 L130 210 L200 170 L290 205 L370 180 L440 200 L540 165 L620 195 L710 175 L800 200 L880 185 L920 195 L920 320 L-20 320 Z" 
        fill="#8FBA7A" stroke="#000" stroke-width="3" stroke-linejoin="round"/>

  <!-- Near hills -->
  <path d="M-20 280 L70 235 L160 255 L250 225 L350 245 L430 230 L530 250 L610 235 L700 248 L780 232 L860 250 L920 240 L920 320 L-20 320 Z" 
        fill="#6B9E5A" stroke="#000" stroke-width="3" stroke-linejoin="round"/>

  <!-- Ground -->
  <path d="M0 270 Q100 265, 200 272 Q350 278, 450 268 Q600 262, 700 273 Q800 279, 900 270 L900 320 L0 320 Z" 
        fill="#4D8040" stroke="#000" stroke-width="2"/>

  <!-- Tree 1 -->
  <rect x="95" y="235" width="10" height="30" fill="#6B4226" stroke="#000" stroke-width="2"/>
  <polygon points="75,240 100,195 125,240" fill="#4A7A3D" stroke="#000" stroke-width="2.5"/>
  <polygon points="80,225 100,185 120,225" fill="#5A8F4A" stroke="#000" stroke-width="2.5"/>

  <!-- Tree 2 -->
  <rect x="245" y="220" width="12" height="35" fill="#6B4226" stroke="#000" stroke-width="2"/>
  <polygon points="220,225 251,170 282,225" fill="#4A7A3D" stroke="#000" stroke-width="2.5"/>
  <polygon points="228,210 251,162 274,210" fill="#5A8F4A" stroke="#000" stroke-width="2.5"/>

  <!-- Tree 3 -->
  <rect x="178" y="248" width="8" height="22" fill="#6B4226" stroke="#000" stroke-width="1.5"/>
  <polygon points="163,252 182,218 201,252" fill="#5A8F4A" stroke="#000" stroke-width="2"/>

  <!-- Tree 4 -->
  <rect x="690" y="228" width="10" height="30" fill="#6B4226" stroke="#000" stroke-width="2"/>
  <polygon points="670,233 695,180 720,233" fill="#4A7A3D" stroke="#000" stroke-width="2.5"/>
  <polygon points="676,218 695,172 714,218" fill="#5A8F4A" stroke="#000" stroke-width="2.5"/>

  <!-- Tree 5 -->
  <rect x="810" y="242" width="8" height="24" fill="#6B4226" stroke="#000" stroke-width="1.5"/>
  <polygon points="795,246 814,212 833,246" fill="#5A8F4A" stroke="#000" stroke-width="2"/>

  <!-- Tree 6 -->
  <rect x="565" y="232" width="10" height="28" fill="#6B4226" stroke="#000" stroke-width="2"/>
  <polygon points="545,237 570,188 595,237" fill="#4A7A3D" stroke="#000" stroke-width="2.5"/>
  <polygon points="551,222 570,180 589,222" fill="#5A8F4A" stroke="#000" stroke-width="2.5"/>

  <!-- Cloud 1 -->
  <g opacity="0.85">
    <animateTransform attributeName="transform" type="translate" values="-200,0;1100,0;-200,0" dur="50s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="65" rx="45" ry="18" fill="#FFF8F0" stroke="#000" stroke-width="2"/>
    <ellipse cx="-20" cy="72" rx="30" ry="13" fill="#FFF8F0" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="22" cy="72" rx="28" ry="12" fill="#FFF8F0" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="0" cy="72" rx="35" ry="14" fill="#FFF8F0"/>
  </g>

  <!-- Cloud 2 -->
  <g opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="900,0;-250,0;900,0" dur="60s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="45" rx="38" ry="15" fill="#FFF8F0" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="-18" cy="52" rx="25" ry="11" fill="#FFF8F0" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="18" cy="52" rx="22" ry="10" fill="#FFF8F0" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="0" cy="52" rx="28" ry="12" fill="#FFF8F0"/>
  </g>

  <!-- Cloud 3 -->
  <g opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="-300,0;1200,0;-300,0" dur="70s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="90" rx="35" ry="14" fill="#FFF8F0" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="-15" cy="96" rx="22" ry="10" fill="#FFF8F0" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="17" cy="96" rx="20" ry="9" fill="#FFF8F0" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="0" cy="96" rx="25" ry="11" fill="#FFF8F0"/>
  </g>

  <!-- Bird 1 -->
  <g opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="-50,0;500,-8;1000,0" dur="18s" repeatCount="indefinite"/>
    <path d="M0,50 Q5,44 10,50" fill="none" stroke="#3D2B1F" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M10,50 Q15,44 20,50" fill="none" stroke="#3D2B1F" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Bird 2 -->
  <g opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="-80,0;450,6;950,0" dur="22s" repeatCount="indefinite"/>
    <path d="M0,35 Q4,30 8,35" fill="none" stroke="#3D2B1F" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M8,35 Q12,30 16,35" fill="none" stroke="#3D2B1F" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Leaf 1 -->
  <ellipse cx="150" cy="20" rx="4" ry="2.5" fill="#D4A76A" stroke="#000" stroke-width="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,0;15,80;-5,160;20,240;5,300" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.6;0.3;0;0.8" dur="9s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Leaf 2 -->
  <ellipse cx="650" cy="10" rx="3.5" ry="2" fill="#C4976A" stroke="#000" stroke-width="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,0;-12,70;8,150;-15,230;2,300" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.5;0.2;0;0.7" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Leaf 3 -->
  <ellipse cx="420" cy="5" rx="3" ry="2" fill="#D4A76A" stroke="#000" stroke-width="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,0;10,90;-8,180;15,270;0,320" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.5;0.2;0;0.8" dur="10s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Title card shadow -->
  <rect x="225" y="55" width="460" height="100" fill="#000" opacity="0.12"/>
  <!-- Title card -->
  <rect x="220" y="50" width="460" height="100" fill="#FFF8E7" stroke="#000" stroke-width="4" opacity="0.9"/>

  <!-- Name -->
  <text x="450" y="97" font-family="monospace" font-size="36" font-weight="bold" fill="#2C1810" text-anchor="middle" letter-spacing="2">RAYID ALI</text>

  <!-- Tagline -->
  <text x="450" y="127" font-family="monospace" font-size="13" fill="#5A3E28" text-anchor="middle" letter-spacing="1">building things at the intersection of AI and "why not"</text>

  <!-- Bottom accent -->
  <rect x="0" y="310" width="900" height="10" fill="#FF8C5A" stroke="#000" stroke-width="2"/>

  <!-- Border -->
  <rect x="0" y="0" width="900" height="320" fill="none" stroke="#000" stroke-width="4"/>
</svg>
