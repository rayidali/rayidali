<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 80" width="820" height="80">
  <!-- Shadow -->
  <rect x="4" y="4" width="812" height="72" fill="#000" opacity="0.12"/>
  <!-- Card -->
  <rect x="0" y="0" width="812" height="72" fill="#2C1810" stroke="#000" stroke-width="3"/>

  <!-- Floating particles in bg -->
  <circle cx="80" cy="20" r="1.5" fill="#A8D5BA" opacity="0.3">
    <animate attributeName="cy" values="25;15;25" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="55" r="1" fill="#FFD760" opacity="0.3">
    <animate attributeName="cy" values="58;48;58" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="18" r="1.5" fill="#FF8C5A" opacity="0.3">
    <animate attributeName="cy" values="22;12;22" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="50" r="1" fill="#B8D4F0" opacity="0.3">
    <animate attributeName="cy" values="54;44;54" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4.2s" repeatCount="indefinite"/>
  </circle>

  <text x="406" y="30" font-family="monospace" font-size="13" fill="#FFF8E7" text-anchor="middle">thanks for scrolling this far. let's build something cool.</text>
  
  <!-- Pulsing contact buttons -->
  <rect x="270" y="42" width="85" height="22" fill="#A8D5BA" stroke="#000" stroke-width="2">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="312" y="57" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">✉ email</text>

  <rect x="365" y="42" width="85" height="22" fill="#FFD760" stroke="#000" stroke-width="2">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </rect>
  <text x="407" y="57" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">in linkedin</text>

  <rect x="460" y="42" width="85" height="22" fill="#FF8C5A" stroke="#000" stroke-width="2">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </rect>
  <text x="502" y="57" font-family="monospace" font-size="10" fill="#FFF8E7" text-anchor="middle">◆ portfolio</text>
</svg>
