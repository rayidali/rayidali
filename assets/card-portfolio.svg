<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 395 190" width="395" height="190">
  <!-- Shadow -->
  <rect x="5" y="5" width="385" height="180" fill="#000" opacity="0.15"/>
  <!-- Card -->
  <rect x="0" y="0" width="385" height="180" fill="#FFF8E7" stroke="#000" stroke-width="3"/>
  <!-- Accent -->
  <rect x="0" y="0" width="385" height="6" fill="#A8D5BA" stroke="#000" stroke-width="2"/>

  <!-- Mini preview - 3D grid mockup -->
  <rect x="270" y="22" width="95" height="65" fill="#1a1a2e" stroke="#000" stroke-width="2" rx="3"/>
  <!-- Grid lines -->
  <line x1="280" y1="75" x2="300" y2="40" stroke="#A8D5BA" stroke-width="0.8" opacity="0.6"/>
  <line x1="300" y1="75" x2="315" y2="40" stroke="#A8D5BA" stroke-width="0.8" opacity="0.6"/>
  <line x1="320" y1="75" x2="330" y2="40" stroke="#A8D5BA" stroke-width="0.8" opacity="0.6"/>
  <line x1="340" y1="75" x2="345" y2="40" stroke="#A8D5BA" stroke-width="0.8" opacity="0.6"/>
  <line x1="355" y1="75" x2="355" y2="40" stroke="#A8D5BA" stroke-width="0.8" opacity="0.6"/>
  <!-- Horizontal grid -->
  <line x1="278" y1="55" x2="358" y2="55" stroke="#A8D5BA" stroke-width="0.5" opacity="0.4"/>
  <line x1="275" y1="65" x2="360" y2="65" stroke="#A8D5BA" stroke-width="0.5" opacity="0.4"/>
  <!-- Glow dot -->
  <circle cx="318" cy="50" r="3" fill="#FFD760" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Title -->
  <text x="18" y="42" font-family="monospace" font-size="20" font-weight="bold" fill="#2C1810">🌐 portfolio</text>

  <!-- Description -->
  <text x="18" y="68" font-family="monospace" font-size="11" fill="#5A3E28">personal site with a three.js</text>
  <text x="18" y="84" font-family="monospace" font-size="11" fill="#5A3E28">3D grid that makes recruiters</text>
  <text x="18" y="100" font-family="monospace" font-size="11" fill="#8B7355">think i'm fancy.</text>

  <!-- Tech tags -->
  <rect x="18" y="118" width="52" height="22" fill="#A8D5BA" stroke="#000" stroke-width="2"/>
  <text x="44" y="133" font-family="monospace" font-size="9" fill="#2C1810" text-anchor="middle">HTML</text>

  <rect x="78" y="118" width="44" height="22" fill="#FFD4A8" stroke="#000" stroke-width="2"/>
  <text x="100" y="133" font-family="monospace" font-size="9" fill="#2C1810" text-anchor="middle">CSS</text>

  <rect x="130" y="118" width="68" height="22" fill="#FBBFCA" stroke="#000" stroke-width="2"/>
  <text x="164" y="133" font-family="monospace" font-size="9" fill="#2C1810" text-anchor="middle">Three.js</text>

  <!-- Bottom bar -->
  <rect x="0" y="154" width="385" height="26" fill="#2C1810"/>
  <text x="18" y="171" font-family="monospace" font-size="10" fill="#A8D5BA">★ 0</text>
  <text x="312" y="171" font-family="monospace" font-size="10" fill="#FFD760">visit site →</text>
</svg>
