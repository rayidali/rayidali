<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 395 190" width="395" height="190">
  <!-- Breathing shadow -->
  <rect x="5" y="5" width="385" height="180" fill="#000" opacity="0.15">
    <animate attributeName="opacity" values="0.12;0.2;0.12" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </rect>
  <!-- Card -->
  <rect x="0" y="0" width="385" height="180" fill="#FFF8E7" stroke="#000" stroke-width="3"/>
  <!-- Accent -->
  <rect x="0" y="0" width="385" height="6" fill="#A8D5BA" stroke="#000" stroke-width="2"/>

  <!-- Animated 3D grid mockup -->
  <rect x="270" y="22" width="95" height="65" fill="#1a1a2e" stroke="#000" stroke-width="2" rx="3"/>
  <!-- Vertical grid lines pulsing -->
  <line x1="285" y1="75" x2="300" y2="35" stroke="#A8D5BA" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="300" y1="75" x2="310" y2="35" stroke="#A8D5BA" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite" begin="0.2s"/>
  </line>
  <line x1="315" y1="75" x2="320" y2="35" stroke="#A8D5BA" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite" begin="0.4s"/>
  </line>
  <line x1="330" y1="75" x2="330" y2="35" stroke="#A8D5BA" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </line>
  <line x1="345" y1="75" x2="340" y2="35" stroke="#A8D5BA" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite" begin="0.8s"/>
  </line>
  <line x1="355" y1="75" x2="348" y2="35" stroke="#A8D5BA" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite" begin="1s"/>
  </line>
  <!-- Horizontal grid -->
  <line x1="278" y1="48" x2="360" y2="48" stroke="#A8D5BA" stroke-width="0.5" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="278" y1="58" x2="360" y2="58" stroke="#A8D5BA" stroke-width="0.5" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </line>
  <line x1="275" y1="68" x2="360" y2="68" stroke="#A8D5BA" stroke-width="0.5" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite" begin="1s"/>
  </line>
  <!-- Floating particles -->
  <circle cx="310" cy="50" r="3" fill="#FFD760" opacity="0.8">
    <animate attributeName="cy" values="55;42;55" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="335" cy="45" r="2" fill="#FF6B6B" opacity="0.6">
    <animate attributeName="cy" values="48;38;48" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="295" cy="60" r="1.5" fill="#B8D4F0" opacity="0.5">
    <animate attributeName="cy" values="62;52;62" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Title -->
  <text x="18" y="42" font-family="monospace" font-size="20" font-weight="bold" fill="#2C1810">🌐 portfolio</text>

  <!-- Description -->
  <text x="18" y="68" font-family="monospace" font-size="11" fill="#5A3E28">personal site with a three.js</text>
  <text x="18" y="84" font-family="monospace" font-size="11" fill="#5A3E28">3D grid that makes recruiters</text>
  <text x="18" y="100" font-family="monospace" font-size="11" fill="#8B7355">think i'm fancy.</text>

  <!-- Tech tags -->
  <rect x="18" y="118" width="52" height="22" fill="#A8D5BA" stroke="#000" stroke-width="2"/>
  <text x="44" y="133" font-family="monospace" font-size="9" fill="#2C1810" text-anchor="middle">HTML</text>
  <rect x="78" y="118" width="44" height="22" fill="#FFD4A8" stroke="#000" stroke-width="2"/>
  <text x="100" y="133" font-family="monospace" font-size="9" fill="#2C1810" text-anchor="middle">CSS</text>
  <rect x="130" y="118" width="68" height="22" fill="#FBBFCA" stroke="#000" stroke-width="2"/>
  <text x="164" y="133" font-family="monospace" font-size="9" fill="#2C1810" text-anchor="middle">Three.js</text>

  <!-- Bottom bar -->
  <rect x="0" y="154" width="385" height="26" fill="#2C1810"/>
  <text x="18" y="171" font-family="monospace" font-size="10" fill="#A8D5BA">★ 0</text>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;5,0;0,0" dur="1.5s" repeatCount="indefinite"/>
    <text x="312" y="171" font-family="monospace" font-size="10" fill="#FFD760">visit site →</text>
  </g>
</svg>
