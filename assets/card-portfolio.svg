<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <!-- Shadow -->
  <rect x="6" y="6" width="388" height="168" fill="#000">
    <animate attributeName="x" values="6;4;6" dur="3s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="y" values="6;4;6" dur="3s" repeatCount="indefinite" begin="1s"/>
  </rect>
  <!-- Card -->
  <rect x="0" y="0" width="388" height="168" fill="#FFF8E7" stroke="#000" stroke-width="3.5"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="388" height="8" fill="#A8D5BA" stroke="#000" stroke-width="3.5"/>
  
  <text x="25" y="50" font-size="28">🌐</text>
  <text x="65" y="48" font-family="monospace" font-size="20" font-weight="bold" fill="#2C1810">rayidali.github.io</text>
  
  <text x="25" y="78" font-family="monospace" font-size="11.5" fill="#5A3E28">personal portfolio with a three.js 3D grid</text>
  <text x="25" y="95" font-family="monospace" font-size="11.5" fill="#5A3E28">that makes recruiters think i'm fancy</text>
  
  <rect x="25" y="115" width="52" height="24" fill="#A8D5BA" stroke="#000" stroke-width="2"/>
  <text x="51" y="131" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">HTML</text>
  
  <rect x="85" y="115" width="44" height="24" fill="#FFD4A8" stroke="#000" stroke-width="2"/>
  <text x="107" y="131" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">CSS</text>
  
  <rect x="137" y="115" width="68" height="24" fill="#FBBFCA" stroke="#000" stroke-width="2"/>
  <text x="171" y="131" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">Three.js</text>

  <rect x="213" y="115" width="44" height="24" fill="#B8D4F0" stroke="#000" stroke-width="2"/>
  <text x="235" y="131" font-family="monospace" font-size="10" fill="#2C1810" text-anchor="middle">JS</text>

  <text x="355" y="155" font-family="monospace" font-size="16" fill="#2C1810">→</text>
